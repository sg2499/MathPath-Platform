name: MathPath CI

'on':
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mathpath-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI_ARTIFACT_RETENTION_DAYS: '14'

jobs:
  governance-audit:
    name: governance-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Resolve comparison base
        id: base
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            BASE="${{ github.event.before }}"
            if printf '%s' "$BASE" | grep -Eq '^0+$'; then BASE="HEAD^"; fi
          else
            BASE_REF="${{ github.base_ref }}"
            if [ -z "$BASE_REF" ]; then BASE_REF="main"; fi
            git fetch origin "$BASE_REF"
            BASE="origin/$BASE_REF"
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
      - name: Validate governance tooling
        run: python -m unittest discover -s scripts/ci/tests -p 'test_*.py' -v
      - name: Classify changed surfaces
        run: |
          mkdir -p ci-artifacts
          python scripts/ci/classify_change.py \
            --base "${{ steps.base.outputs.base }}" \
            --head HEAD \
            --output-dir ci-artifacts
      - name: Report deployment configuration drift
        run: |
          python scripts/ci/check_config_drift.py \
            --render-file render.yaml \
            --output-dir ci-artifacts
      - name: Run repository exposure audit
        run: |
          python scripts/ci/repository_exposure_audit.py \
            --repository-root . \
            --visibility "${{ github.event.repository.visibility }}" \
            --output-dir ci-artifacts
      - name: Publish governance summary
        if: always()
        shell: bash
        run: |
          for report in \
            ci-artifacts/change-classification.md \
            ci-artifacts/config-drift.md \
            ci-artifacts/repository-exposure-audit.md
          do
            if [ -f "$report" ]; then
              cat "$report" >> "$GITHUB_STEP_SUMMARY"
              printf '\n\n' >> "$GITHUB_STEP_SUMMARY"
            fi
          done
      - name: Upload governance evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: governance-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-artifacts
          if-no-files-found: error
          retention-days: ${{ env.CI_ARTIFACT_RETENTION_DAYS }}

  repository-safety:
    name: repository-safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Validate diff and secret-bearing paths
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts
          if [ "${{ github.event_name }}" = "push" ]; then
            BASE="${{ github.event.before }}"
            if printf '%s' "$BASE" | grep -Eq '^0+$'; then BASE="HEAD^"; fi
          else
            BASE_REF="${{ github.base_ref }}"
            if [ -z "$BASE_REF" ]; then BASE_REF="main"; fi
            git fetch origin "$BASE_REF"
            BASE="origin/$BASE_REF"
          fi
          git diff --check "$BASE...HEAD"
          changed="$(git diff --name-only "$BASE...HEAD")"
          printf '%s\n' "$changed" | tee ci-artifacts/changed-files.txt
          secret_paths="$(printf '%s\n' "$changed" | grep -E '(^|/)(\.env($|\.)|.*\.pem$|.*\.key$|id_rsa$|credentials\.json$|secrets?\.)' | grep -vE '(^|/)\.env\.example$' || true)"
          if [ -n "$secret_paths" ]; then
            printf '%s\n' "$secret_paths" >&2
            echo 'Secret-bearing file path detected.' >&2
            exit 1
          fi
          {
            echo '## Repository safety'
            echo
            echo '- Git whitespace validation: passed'
            echo '- Secret-bearing changed paths: none'
            echo "- Changed file count: $(printf '%s\n' "$changed" | sed '/^$/d' | wc -l)"
          } | tee ci-artifacts/repository-safety.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload repository safety evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: repository-safety-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-artifacts
          if-no-files-found: warn
          retention-days: ${{ env.CI_ARTIFACT_RETENTION_DAYS }}

  delivery-console-lint:
    name: delivery-console-lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Parse MathPath PowerShell automation
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force 'ci-artifacts' | Out-Null
          $files = Get-ChildItem 'tools/mathpath-delivery' -Filter '*.ps1' -File
          if ($files.Count -eq 0) { throw 'No MathPath PowerShell automation files were found.' }
          $allErrors = @()
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($file.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $allErrors += $errors | ForEach-Object { "$($file.FullName): $($_.Message)" }
            }
          }
          if ($allErrors.Count -gt 0) { throw ($allErrors -join "`n") }
          "Parsed $($files.Count) PowerShell files successfully." | Set-Content 'ci-artifacts/delivery-console-lint.txt'
      - name: Validate console JSON files
        shell: powershell
        run: |
          Get-Content 'tools/mathpath-delivery/change-package.schema.json' -Raw | ConvertFrom-Json | Out-Null
          Get-Content 'tools/mathpath-delivery/config.example.json' -Raw | ConvertFrom-Json | Out-Null
      - name: Publish console lint summary
        shell: powershell
        run: |
          "## Delivery console lint`n`n- PowerShell parser: passed`n- Console JSON files: passed" | Add-Content $env:GITHUB_STEP_SUMMARY
      - name: Upload console lint evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: delivery-console-lint-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-artifacts
          if-no-files-found: warn
          retention-days: ${{ env.CI_ARTIFACT_RETENTION_DAYS }}

  backend-tests:
    name: backend-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./mathpath_ci.db
      SEED_ON_STARTUP: 'false'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Run backend tests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ../ci-artifacts
          python -m pytest tests -q 2>&1 | tee ../ci-artifacts/backend-tests.txt
      - name: Publish backend summary
        if: always()
        shell: bash
        run: |
          echo '## Backend tests' >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          tail -n 20 ../ci-artifacts/backend-tests.txt >> "$GITHUB_STEP_SUMMARY" || true
      - name: Upload backend evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-tests-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-artifacts/backend-tests.txt
          if-no-files-found: warn
          retention-days: ${{ env.CI_ARTIFACT_RETENTION_DAYS }}

  mathpath-generator-validation:
    name: mathpath-generator-validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./mathpath_generator_ci.db
      SEED_ON_STARTUP: 'false'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Run available generator and curriculum regression tests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ../ci-artifacts
          tests=()
          for file in \
            tests/test_generator.py \
            tests/test_mm_competition_mock_generator.py \
            tests/test_mm_visual_curriculum_mapping.py
          do
            [ -f "$file" ] && tests+=("$file")
          done
          if [ "${#tests[@]}" -eq 0 ]; then
            echo 'No generator regression tests were found.' >&2
            exit 1
          fi
          python -m pytest "${tests[@]}" -q 2>&1 | tee ../ci-artifacts/generator-validation.txt
      - name: Publish generator summary
        if: always()
        shell: bash
        run: |
          echo '## Generator validation' >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          tail -n 20 ../ci-artifacts/generator-validation.txt >> "$GITHUB_STEP_SUMMARY" || true
      - name: Upload generator evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: generator-validation-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-artifacts/generator-validation.txt
          if-no-files-found: warn
          retention-days: ${{ env.CI_ARTIFACT_RETENTION_DAYS }}

  frontend-typecheck:
    name: frontend-typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
          package-manager-cache: false
      - run: npm ci --no-audit --no-fund
      - name: Run frontend typecheck
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ../ci-artifacts
          npm run typecheck 2>&1 | tee ../ci-artifacts/frontend-typecheck.txt
      - name: Upload typecheck evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-typecheck-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-artifacts/frontend-typecheck.txt
          if-no-files-found: warn
          retention-days: ${{ env.CI_ARTIFACT_RETENTION_DAYS }}

  frontend-build:
    name: frontend-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
          package-manager-cache: false
      - run: npm ci --no-audit --no-fund
      - name: Run frontend production build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ../ci-artifacts
          npm run build 2>&1 | tee ../ci-artifacts/frontend-build.txt
      - name: Upload frontend build evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-artifacts/frontend-build.txt
          if-no-files-found: warn
          retention-days: ${{ env.CI_ARTIFACT_RETENTION_DAYS }}

  ci-summary:
    name: ci-summary
    if: always()
    runs-on: ubuntu-latest
    needs:
      - governance-audit
      - repository-safety
      - delivery-console-lint
      - backend-tests
      - mathpath-generator-validation
      - frontend-typecheck
      - frontend-build
    steps:
      - name: Publish final CI result
        shell: bash
        env:
          GOVERNANCE: ${{ needs.governance-audit.result }}
          SAFETY: ${{ needs.repository-safety.result }}
          CONSOLE: ${{ needs.delivery-console-lint.result }}
          BACKEND: ${{ needs.backend-tests.result }}
          GENERATOR: ${{ needs.mathpath-generator-validation.result }}
          TYPECHECK: ${{ needs.frontend-typecheck.result }}
          BUILD: ${{ needs.frontend-build.result }}
        run: |
          set -euo pipefail
          {
            echo '## MathPath CI summary'
            echo
            echo '| Check | Result |'
            echo '|---|---|'
            echo "| Governance audit | $GOVERNANCE |"
            echo "| Repository safety | $SAFETY |"
            echo "| Delivery console lint | $CONSOLE |"
            echo "| Backend tests | $BACKEND |"
            echo "| Generator validation | $GENERATOR |"
            echo "| Frontend typecheck | $TYPECHECK |"
            echo "| Frontend production build | $BUILD |"
          } >> "$GITHUB_STEP_SUMMARY"
          for result in "$GOVERNANCE" "$SAFETY" "$CONSOLE" "$BACKEND" "$GENERATOR" "$TYPECHECK" "$BUILD"; do
            if [ "$result" != 'success' ]; then
              echo "A required CI job did not succeed: $result" >&2
              exit 1
            fi
          done
