name: MathPath CI

'on':
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mathpath-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI_ARTIFACT_RETENTION_DAYS: '14'

jobs:
  governance-audit:
    name: governance-audit
    runs-on: ubuntu-latest
    outputs:
      test_plan_mode: ${{ steps.classification.outputs.test_plan_mode }}
      run_backend: ${{ steps.classification.outputs.run_backend }}
      run_generator: ${{ steps.classification.outputs.run_generator }}
      run_frontend_typecheck: ${{ steps.classification.outputs.run_frontend_typecheck }}
      run_frontend_build: ${{ steps.classification.outputs.run_frontend_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Resolve comparison base
        id: base
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            BASE="${{ github.event.before }}"
            if printf '%s' "$BASE" | grep -Eq '^0+$'; then BASE="HEAD^"; fi
          else
            BASE_REF="${{ github.base_ref }}"
            if [ -z "$BASE_REF" ]; then BASE_REF="main"; fi
            git fetch origin "$BASE_REF"
            BASE="origin/$BASE_REF"
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
      - name: Validate governance tooling
        run: python -m unittest discover -s scripts/ci/tests -p 'test_*.py' -v
      - name: Classify changed surfaces and build conservative test plan
        id: classification
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts
          extra_args=()
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            extra_args+=(--force-full)
          fi
          python scripts/ci/classify_change.py \
            --base "${{ steps.base.outputs.base }}" \
            --head HEAD \
            --output-dir ci-artifacts \
            --github-output "$GITHUB_OUTPUT" \
            "${extra_args[@]}"
      - name: Report deployment configuration drift
        run: |
          python scripts/ci/check_config_drift.py \
            --render-file render.yaml \
            --output-dir ci-artifacts
      - name: Run repository exposure audit
        run: |
          python scripts/ci/repository_exposure_audit.py \
            --repository-root . \
            --visibility "${{ github.event.repository.visibility }}" \
            --output-dir ci-artifacts
      - name: Publish governance summary
        if: always()
        shell: bash
        run: |
          for report in \
            ci-artifacts/change-classification.md \
            ci-artifacts/config-drift.md \
            ci-artifacts/repository-exposure-audit.md
          do
            if [ -f "$report" ]; then
              cat "$report" >> "$GITHUB_STEP_SUMMARY"
              printf '\n\n' >> "$GITHUB_STEP_SUMMARY"
            fi
          done
      - name: Upload governance evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: governance-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-artifacts
          if-no-files-found: error
          retention-days: ${{ env.CI_ARTIFACT_RETENTION_DAYS }}

  repository-safety:
    name: repository-safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate diff and secret-bearing paths
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts
          if [ "${{ github.event_name }}" = "push" ]; then
            BASE="${{ github.event.before }}"
            if printf '%s' "$BASE" | grep -Eq '^0+$'; then BASE="HEAD^"; fi
          else
            BASE_REF="${{ github.base_ref }}"
            if [ -z "$BASE_REF" ]; then BASE_REF="main"; fi
            git fetch origin "$BASE_REF"
            BASE="origin/$BASE_REF"
          fi
          git diff --check "$BASE...HEAD"
          changed="$(git diff --name-only "$BASE...HEAD")"
          printf '%s\n' "$changed" | tee ci-artifacts/changed-files.txt
          secret_paths="$(printf '%s\n' "$changed" | grep -E '(^|/)(\.env($|\.)|.*\.pem$|.*\.key$|id_rsa$|credentials\.json$|secrets?\.)' | grep -vE '(^|/)\.env\.example$' || true)"
          if [ -n "$secret_paths" ]; then
            printf '%s\n' "$secret_paths" >&2
            echo 'Secret-bearing file path detected.' >&2
            exit 1
          fi
          {
            echo '## Repository safety'
            echo
            echo '- Git whitespace validation: passed'
            echo '- Secret-bearing changed paths: none'
            echo "- Changed file count: $(printf '%s\n' "$changed" | sed '/^$/d' | wc -l)"
          } | tee ci-artifacts/repository-safety.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload repository safety evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: repository-safety-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-artifacts
          if-no-files-found: warn
          retention-days: ${{ env.CI_ARTIFACT_RETENTION_DAYS }}

  delivery-console-lint:
    name: delivery-console-lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse MathPath PowerShell automation
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force 'ci-artifacts' | Out-Null
          $files = Get-ChildItem 'tools/mathpath-delivery' -Filter '*.ps1' -File
          if ($files.Count -eq 0) { throw 'No MathPath PowerShell automation files were found.' }
          $allErrors = @()
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($file.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $allErrors += $errors | ForEach-Object { "$($file.FullName): $($_.Message)" }
            }
          }
          if ($allErrors.Count -gt 0) { throw ($allErrors -join "`n") }
          "Parsed $($files.Count) PowerShell files successfully." | Set-Content 'ci-artifacts/delivery-console-lint.txt'
      - name: Validate console JSON files
        shell: powershell
        run: |
          Get-Content 'tools/mathpath-delivery/change-package.schema.json' -Raw | ConvertFrom-Json | Out-Null
          Get-Content 'tools/mathpath-delivery/config.example.json' -Raw | ConvertFrom-Json | Out-Null
      - name: Publish console lint summary
        shell: powershell
        run: |
          "## Delivery console lint`n`n- PowerShell parser: passed`n- Console JSON files: passed" | Add-Content $env:GITHUB_STEP_SUMMARY
      - name: Upload console lint evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: delivery-console-lint-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-artifacts
          if-no-files-found: warn
          retention-days: ${{ env.CI_ARTIFACT_RETENTION_DAYS }}

  backend-tests:
    name: backend-tests
    needs: governance-audit
    if: always()
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./mathpath_ci.db
      SEED_ON_STARTUP: 'false'
    steps:
      - uses: actions/checkout@v4
      - name: Resolve conservative backend decision
        id: decision
        shell: bash
        working-directory: .
        env:
          GOVERNANCE_RESULT: ${{ needs.governance-audit.result }}
          PLAN_MODE: ${{ needs.governance-audit.outputs.test_plan_mode }}
          PLANNED_RUN: ${{ needs.governance-audit.outputs.run_backend }}
        run: |
          set -euo pipefail
          run=true
          reason='fail-safe full validation because the governance plan was unavailable'
          if [ "$GOVERNANCE_RESULT" = 'success' ] && { [ "$PLANNED_RUN" = 'true' ] || [ "$PLANNED_RUN" = 'false' ]; }; then
            run="$PLANNED_RUN"
            reason="conservative plan mode: ${PLAN_MODE:-unknown}"
          fi
          echo "run=$run" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@v5
        if: steps.decision.outputs.run == 'true'
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
        if: steps.decision.outputs.run == 'true'
      - name: Run backend tests
        if: steps.decision.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ../ci-artifacts
          python -m pytest tests -q 2>&1 | tee ../ci-artifacts/backend-tests.txt
      - name: Record backend no-op evidence
        if: steps.decision.outputs.run != 'true'
        shell: bash
        run: |
          mkdir -p ../ci-artifacts
          {
            echo 'Backend heavy suite not required for this change.'
            echo "${{ steps.decision.outputs.reason }}"
          } | tee ../ci-artifacts/backend-tests.txt
      - name: Publish backend summary
        if: always()
        shell: bash
        run: |
          echo '## Backend tests' >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          tail -n 20 ../ci-artifacts/backend-tests.txt >> "$GITHUB_STEP_SUMMARY" || true
      - name: Upload backend evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-tests-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-artifacts/backend-tests.txt
          if-no-files-found: warn
          retention-days: ${{ env.CI_ARTIFACT_RETENTION_DAYS }}

  mathpath-generator-validation:
    name: mathpath-generator-validation
    needs: governance-audit
    if: always()
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./mathpath_generator_ci.db
      SEED_ON_STARTUP: 'false'
    steps:
      - uses: actions/checkout@v4
      - name: Resolve conservative generator decision
        id: decision
        shell: bash
        working-directory: .
        env:
          GOVERNANCE_RESULT: ${{ needs.governance-audit.result }}
          PLAN_MODE: ${{ needs.governance-audit.outputs.test_plan_mode }}
          PLANNED_RUN: ${{ needs.governance-audit.outputs.run_generator }}
        run: |
          set -euo pipefail
          run=true
          reason='fail-safe full validation because the governance plan was unavailable'
          if [ "$GOVERNANCE_RESULT" = 'success' ] && { [ "$PLANNED_RUN" = 'true' ] || [ "$PLANNED_RUN" = 'false' ]; }; then
            run="$PLANNED_RUN"
            reason="conservative plan mode: ${PLAN_MODE:-unknown}"
          fi
          echo "run=$run" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@v5
        if: steps.decision.outputs.run == 'true'
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
        if: steps.decision.outputs.run == 'true'
      - name: Run available generator and curriculum regression tests
        if: steps.decision.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ../ci-artifacts
          tests=()
          for file in \
            tests/test_generator.py \
            tests/test_mm_competition_mock_generator.py \
            tests/test_mm_visual_curriculum_mapping.py
          do
            [ -f "$file" ] && tests+=("$file")
          done
          if [ "${#tests[@]}" -eq 0 ]; then
            echo 'No generator regression tests were found.' >&2
            exit 1
          fi
          python -m pytest "${tests[@]}" -q 2>&1 | tee ../ci-artifacts/generator-validation.txt
      - name: Record generator no-op evidence
        if: steps.decision.outputs.run != 'true'
        shell: bash
        run: |
          mkdir -p ../ci-artifacts
          {
            echo 'Generator heavy suite not required for this change.'
            echo "${{ steps.decision.outputs.reason }}"
          } | tee ../ci-artifacts/generator-validation.txt
      - name: Publish generator summary
        if: always()
        shell: bash
        run: |
          echo '## Generator validation' >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          tail -n 20 ../ci-artifacts/generator-validation.txt >> "$GITHUB_STEP_SUMMARY" || true
      - name: Upload generator evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: generator-validation-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-artifacts/generator-validation.txt
          if-no-files-found: warn
          retention-days: ${{ env.CI_ARTIFACT_RETENTION_DAYS }}

  frontend-typecheck:
    name: frontend-typecheck
    needs: governance-audit
    if: always()
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Resolve conservative typecheck decision
        id: decision
        shell: bash
        working-directory: .
        env:
          GOVERNANCE_RESULT: ${{ needs.governance-audit.result }}
          PLAN_MODE: ${{ needs.governance-audit.outputs.test_plan_mode }}
          PLANNED_RUN: ${{ needs.governance-audit.outputs.run_frontend_typecheck }}
        run: |
          set -euo pipefail
          run=true
          reason='fail-safe full validation because the governance plan was unavailable'
          if [ "$GOVERNANCE_RESULT" = 'success' ] && { [ "$PLANNED_RUN" = 'true' ] || [ "$PLANNED_RUN" = 'false' ]; }; then
            run="$PLANNED_RUN"
            reason="conservative plan mode: ${PLAN_MODE:-unknown}"
          fi
          echo "run=$run" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v4
        if: steps.decision.outputs.run == 'true'
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
        if: steps.decision.outputs.run == 'true'
      - name: Run frontend typecheck
        if: steps.decision.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ../ci-artifacts
          npm run typecheck 2>&1 | tee ../ci-artifacts/frontend-typecheck.txt
      - name: Record typecheck no-op evidence
        if: steps.decision.outputs.run != 'true'
        shell: bash
        run: |
          mkdir -p ../ci-artifacts
          {
            echo 'Frontend typecheck heavy suite not required for this change.'
            echo "${{ steps.decision.outputs.reason }}"
          } | tee ../ci-artifacts/frontend-typecheck.txt
      - name: Publish typecheck summary
        if: always()
        shell: bash
        run: |
          echo '## Frontend typecheck' >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          tail -n 20 ../ci-artifacts/frontend-typecheck.txt >> "$GITHUB_STEP_SUMMARY" || true
      - name: Upload typecheck evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-typecheck-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-artifacts/frontend-typecheck.txt
          if-no-files-found: warn
          retention-days: ${{ env.CI_ARTIFACT_RETENTION_DAYS }}

  frontend-build:
    name: frontend-build
    needs: governance-audit
    if: always()
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Resolve conservative build decision
        id: decision
        shell: bash
        working-directory: .
        env:
          GOVERNANCE_RESULT: ${{ needs.governance-audit.result }}
          PLAN_MODE: ${{ needs.governance-audit.outputs.test_plan_mode }}
          PLANNED_RUN: ${{ needs.governance-audit.outputs.run_frontend_build }}
        run: |
          set -euo pipefail
          run=true
          reason='fail-safe full validation because the governance plan was unavailable'
          if [ "$GOVERNANCE_RESULT" = 'success' ] && { [ "$PLANNED_RUN" = 'true' ] || [ "$PLANNED_RUN" = 'false' ]; }; then
            run="$PLANNED_RUN"
            reason="conservative plan mode: ${PLAN_MODE:-unknown}"
          fi
          echo "run=$run" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v4
        if: steps.decision.outputs.run == 'true'
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
        if: steps.decision.outputs.run == 'true'
      - name: Run frontend production build
        if: steps.decision.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ../ci-artifacts
          npm run build 2>&1 | tee ../ci-artifacts/frontend-build.txt
      - name: Record build no-op evidence
        if: steps.decision.outputs.run != 'true'
        shell: bash
        run: |
          mkdir -p ../ci-artifacts
          {
            echo 'Frontend production build heavy suite not required for this change.'
            echo "${{ steps.decision.outputs.reason }}"
          } | tee ../ci-artifacts/frontend-build.txt
      - name: Publish frontend build summary
        if: always()
        shell: bash
        run: |
          echo '## Frontend production build' >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          tail -n 20 ../ci-artifacts/frontend-build.txt >> "$GITHUB_STEP_SUMMARY" || true
      - name: Upload frontend build evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-artifacts/frontend-build.txt
          if-no-files-found: warn
          retention-days: ${{ env.CI_ARTIFACT_RETENTION_DAYS }}

  frontend-e2e-tests:
    name: frontend-e2e-tests
    needs: [frontend-build, backend-tests]
    if: always()
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./backend/mathpath_e2e.db
      SEED_ON_STARTUP: 'true'
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Boot backend server
        working-directory: backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund
      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps
      - name: Boot frontend server
        working-directory: frontend
        run: |
          npm run build
          npm run start &
          sleep 10
      - name: Run E2E Playwright Suite
        working-directory: frontend
        run: |
          set -euo pipefail
          mkdir -p ../ci-artifacts
          npm run verify:mathpath 2>&1 | tee ../ci-artifacts/frontend-e2e-tests.txt
      - name: Run Student Login Responsive Matrix
        working-directory: frontend
        run: |
          set -euo pipefail
          npm run verify:student-login-responsive 2>&1 | tee ../ci-artifacts/student-login-responsive.txt
      - name: Upload Playwright Artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: warn
          retention-days: ${{ env.CI_ARTIFACT_RETENTION_DAYS }}
      - name: Publish E2E summary
        if: always()
        shell: bash
        run: |
          echo '## Frontend E2E Playwright tests' >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          tail -n 20 ci-artifacts/frontend-e2e-tests.txt >> "$GITHUB_STEP_SUMMARY" || true
      - name: Upload E2E evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-e2e-tests-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ci-artifacts/frontend-e2e-tests.txt
            ci-artifacts/student-login-responsive.txt
          if-no-files-found: warn
          retention-days: ${{ env.CI_ARTIFACT_RETENTION_DAYS }}

  ci-summary:
    name: ci-summary
    if: always()
    runs-on: ubuntu-latest
    needs:
      - governance-audit
      - repository-safety
      - delivery-console-lint
      - backend-tests
      - mathpath-generator-validation
      - frontend-typecheck
      - frontend-build
      - frontend-e2e-tests
    steps:
      - name: Publish final CI result
        shell: bash
        env:
          GOVERNANCE: ${{ needs.governance-audit.result }}
          PLAN_MODE: ${{ needs.governance-audit.outputs.test_plan_mode }}
          SAFETY: ${{ needs.repository-safety.result }}
          CONSOLE: ${{ needs.delivery-console-lint.result }}
          BACKEND: ${{ needs.backend-tests.result }}
          GENERATOR: ${{ needs.mathpath-generator-validation.result }}
          TYPECHECK: ${{ needs.frontend-typecheck.result }}
          BUILD: ${{ needs.frontend-build.result }}
          E2E: ${{ needs.frontend-e2e-tests.result }}
        run: |
          set -euo pipefail
          {
            echo '## MathPath CI summary'
            echo
            echo "- Conservative test-plan mode: ${PLAN_MODE:-fail-safe-full}"
            echo
            echo '| Check | Result |'
            echo '|---|---|'
            echo "| Governance audit | $GOVERNANCE |"
            echo "| Repository safety | $SAFETY |"
            echo "| Delivery console lint | $CONSOLE |"
            echo "| Backend tests | $BACKEND |"
            echo "| Generator validation | $GENERATOR |"
            echo "| Frontend typecheck | $TYPECHECK |"
            echo "| Frontend production build | $BUILD |"
            echo "| Frontend E2E Playwright tests | $E2E |"
          } >> "$GITHUB_STEP_SUMMARY"
          for result in "$GOVERNANCE" "$SAFETY" "$CONSOLE" "$BACKEND" "$GENERATOR" "$TYPECHECK" "$BUILD" "$E2E"; do
            if [ "$result" != 'success' ]; then
              echo "A required CI job did not succeed: $result" >&2
              exit 1
            fi
          done
