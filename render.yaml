services:
  - type: web
    name: mathpath-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 4 --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mathpath-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: SEED_ON_STARTUP
        value: "true"
      # NOTE (2026-07-21 security audit, Phase 1): the app only reads
      # ASSESSMENT_READINESS_FORCE_STRICT (see backend/app/core/config.py).
      # A stale TEMPORARY_ASSESSMENT_READINESS_BYPASS var here previously did
      # nothing -- the app silently ignored it and defaulted to bypass-on.
      # This line preserves that same real-world behavior (bypass stays
      # active) but now names the variable the code actually reads, so the
      # deployed config is honest about what's really happening. Set this to
      # "true" only when you deliberately want strict readiness gating live.
      - key: ASSESSMENT_READINESS_FORCE_STRICT
        value: "false"
      - key: ASSESSMENT_TESTING_OVERRIDE_ENABLED
        value: "false"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: "MathPath Team"
      - key: SMTP_USE_TLS
        value: "true"

databases:
  - name: mathpath-postgres
    databaseName: mathpath
    user: mathpath_user
